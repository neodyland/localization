name: CI

on:
  pull_request:
  push:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
  RUST_NIGHTLY: nightly-2026-04-11

jobs:
  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - name: Install nightly toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_NIGHTLY }}
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy_and_test:
    name: cargo clippy + test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"
      RUSTFLAGS: -C link-arg=-fuse-ld=mold -Z threads=8
      RUSTDOCFLAGS: -Z threads=8

    steps:
      - uses: actions/checkout@v6

      - name: Install mold
        uses: rui314/setup-mold@v1
        with:
          make-default: false

      - name: Install nightly toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_NIGHTLY }}
          components: clippy
          targets: thumbv7em-none-eabihf

      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ubuntu-nightly-fast
          cache-all-crates: true
          cache-workspace-crates: true
          cache-on-failure: true

      - name: Install sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Run clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Check localization default features
        run: cargo check -p localization --locked

      - name: Check localization alloc feature
        run: cargo check -p localization --no-default-features --features alloc --locked

      - name: Check localization alloc feature on no_std target
        run: cargo check -p localization --no-default-features --features alloc --target thumbv7em-none-eabihf --locked

      - name: Check localization all features
        run: cargo check -p localization --all-features --locked

      - name: Run clippy for localization alloc feature
        run: cargo clippy -p localization --no-default-features --features alloc --locked -- -D warnings

      - name: Run basic example
        run: cargo run --example basic --locked

      - name: Run tests
        run: cargo test --workspace --all-targets --locked

      - name: Run doc tests
        run: cargo test --workspace --doc --locked

      - name: Show sccache stats
        if: always()
        run: sccache --show-stats
